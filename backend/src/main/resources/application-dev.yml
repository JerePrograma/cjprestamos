spring:

  datasource:
    url: jdbc:postgresql://localhost:5432/cjprestamos
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    user:
      name: ${APP_BASIC_USER:operadora}
      password: ${APP_BASIC_PASSWORD:operadora123}

logging:
  level:
    org.hibernate.SQL: info
