name: backend-tests

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verificar Docker disponible
        run: docker info

      - name: Ejecutar tests backend (incluye integración Testcontainers)
        working-directory: backend
        run: mvn test
